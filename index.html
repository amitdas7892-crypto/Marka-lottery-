<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP MATKA APP</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="theme-color" content="#00ff88">

    <style>
        :root {
            --neon-green: #00ff88;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-dark);
            color: white;
            margin: 0;
            padding: 15px;
            text-align: center;
        }

        /* Top Branding */
        .header-card {
            border: 2px solid var(--neon-green);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 20px;
            background: rgba(0, 255, 136, 0.05);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.2);
        }

        /* Result Timing Board */
        .result-section {
            background: #1e293b;
            border: 2px solid #ffcc00;
            border-radius: 15px;
            margin: 20px auto;
            max-width: 400px;
            padding: 15px;
            box-shadow: 0 0 15px rgba(255, 204, 0, 0.2);
        }

        .result-grid {
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }

        .res-box {
            flex: 1;
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 10px;
        }

        .win-tag {
            background: var(--neon-green);
            color: black;
            border-radius: 5px;
            font-weight: bold;
            padding: 5px 0;
            margin-top: 5px;
            font-size: 18px;
        }

        /* 0-9 Grid Layout */
        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            max-width: 400px;
            margin: 25px auto;
        }

        .num-btn {
            aspect-ratio: 1;
            background: var(--card-bg);
            border: 1px solid #334155;
            color: white;
            font-size: 24px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
        }

        .num-btn.selected {
            background: var(--neon-green);
            color: #000;
            box-shadow: 0 0 20px var(--neon-green);
            border: none;
            transform: scale(1.1);
        }

        /* Payment/QR Section */
        #pay-area {
            display: none;
            margin-top: 25px;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 20px;
            border: 2px solid var(--neon-green);
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .qr-img {
            width: 100%;
            max-width: 250px;
            border: 4px solid white;
            border-radius: 15px;
            margin: 15px 0;
        }

        .wa-btn {
            display: block;
            background: #25D366;
            color: white;
            padding: 15px;
            text-decoration: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <div class="header-card">
        <h2 style="margin:0; color: var(--neon-green);">VIP SINGLE DIGIT (0-9)</h2>
        <p style="margin:5px 0; font-size:14px; color:#cbd5e1;">Prizes: ₹10-₹60 /</p>
    </div>

    <div class="result-section" style="background: #1e293b; border: 2px solid #ffcc00; border-radius: 15px; margin: 20px auto; max-width: 400px; padding: 15px; box-shadow: 0 0 15px rgba(255, 204, 0, 0.2);">
    
    <div style="margin-bottom: 10px; border-bottom: 1px solid #334155; padding-bottom: 8px;">
        <h3 style="margin: 0; color: #ffcc00; font-size: 18px;">🏆 RESULT BOARD</h3>
        <p id="liveClock" style="margin: 5px 0 0 0; font-size: 13px; color: #00ff88; font-weight: bold;"></p>
    </div>

    <div class="result-grid" style="display: flex; justify-content: space-between; gap: 10px;">
        <div class="res-box" style="flex: 1; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 10px;">
            <p style="margin:0; font-size:11px; color:#94a3b8;">MORNING (12 PM)</p>
            <div class="win-tag" style="background: #00ff88; color: black; border-radius: 5px; font-weight: bold; padding: 5px 0; margin-top: 5px; font-size: 18px;">#2</div>
        </div>

        <div class="res-box" style="flex: 1; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 10px;">
            <p style="margin:0; font-size:11px; color:#94a3b8;">EVENING (08 PM)</p>
            <div class="win-tag" style="background: #ff007f; color: white; border-radius: 5px; font-weight: bold; padding: 5px 0; margin-top: 5px; font-size: 18px;">#wait</div>
        </div>
    </div>
</div>

<script>
    // Live Clock aur Date dikhane ka function
    function updateClock() {
        const now = new Date();
        const options = { day: '2-digit', month: 'short', year: 'numeric' };
        const dateStr = now.toLocaleDateString('en-IN', options);
        const timeStr = now.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        
        document.getElementById('liveClock').innerHTML = `📅 ${dateStr} | 🕒 ${timeStr}`;
    }

    // Har 1 second mein clock update hogi
    setInterval(updateClock, 1000);
    updateClock(); // Turant chalane ke liye
</script>


    <div class="grid" id="grid"></div>

    <div id="pay-area">
        <h3 style="margin:0">Selected: <span id="selNum" style="color:var(--neon-green)">--</span></h3>
        <img src="IMG_4736.jpeg" class="qr-img" alt="Scan QR">
        <p style="font-size:13px; color:#94a3b8; margin-bottom:15px;">QR Scan karke WhatsApp pe screenshot bheinjein</p>
        <a id="waLink" href="#" target="_blank" class="wa-btn">✅ WhatsApp Screenshot</a>
    </div>

    <script>
        const grid = document.getElementById('grid');
        const myNo = "918521694137";

        // Generate 0-9 Buttons
        for (let i = 0; i <= 9; i++) {
            let btn = document.createElement('button');
            btn.innerText = i;
            btn.className = 'num-btn';
            btn.onclick = function() {
                document.querySelectorAll('.num-btn').forEach(b => b.classList.remove('selected'));
                this.classList.add('selected');
                
                const area = document.getElementById('pay-area');
                area.style.display = 'block';
                document.getElementById('selNum').innerText = i;
                
                let msg = `*VIP SINGLE DIGIT ENTRY*\n*Number:* ${i}\n*Status:* Payment Done`;
                document.getElementById('waLink').href = `https://wa.me/${myNo}?text=${encodeURIComponent(msg)}`;
                
                setTimeout(() => area.scrollIntoView({behavior: 'smooth'}), 100);
            };
            grid.appendChild(btn);
        }

        // PWA App registration
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.register('sw.js').catch(() => {});
        }
    </script>
</body>
</html>
