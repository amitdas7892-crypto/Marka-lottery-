<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP MEGA DRAW 1-40</title>
    <style>
        :root {
            --neon-green: #00ff88;
            --bg-dark: #0a0f1d;
            --card-bg: #161f33;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-dark);
            color: white;
            margin: 0;
            padding: 15px;
            text-align: center;
        }

        .header {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            padding: 20px;
            border-radius: 20px;
            border: 2px solid var(--neon-green);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
            margin-bottom: 25px;
        }

        .prize-pool {
            display: flex;
            justify-content: space-around;
            margin-top: 15px;
        }

        .prize-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 12px;
            width: 45%;
        }

        .prize-box p { margin: 5px 0 0; font-weight: bold; font-size: 18px; color: var(--neon-green); }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            max-width: 450px;
            margin: 0 auto;
        }

        .num-btn {
            aspect-ratio: 1;
            background: var(--card-bg);
            border: 1px solid #2d3748;
            color: white;
            font-size: 18px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
        }

        .num-btn.selected {
            background: var(--neon-green);
            color: #000;
            box-shadow: 0 0 15px var(--neon-green);
        }

        /* PAYMENT AREA FIXED */
        #payment-area {
            display: none; 
            margin: 30px auto;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 25px;
            border: 2px solid var(--neon-green);
            max-width: 400px;
        }

        .qr-img {
            width: 100%;
            max-width: 250px;
            border: 5px solid white;
            border-radius: 15px;
            margin: 15px 0;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        .btn-wa {
            display: block;
            background: #25D366;
            color: white;
            padding: 16px;
            text-decoration: none;
            border-radius: 15px;
            font-weight: bold;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="margin:0; color: var(--neon-green);">VIP DRAW (1-40)</h2>
        <div class="prize-pool">
            <div class="prize-box">
                <h4>1st Prize</h4>
                <p>₹2000</p>
            </div>
            <div class="prize-box">
                <h4>2nd Prize</h4>
                <p>₹300</p>
            </div>
        </div>
    </div>

    <div class="grid" id="numberGrid"></div>

    <div id="payment-area">
        <h3 style="margin:0">Selected: <span id="displayNum" style="color:var(--neon-green)">--</span></h3>
        
        <img src="./IMG_4536.jpeg" class="qr-img" alt="QR Code" onerror="this.src='https://placehold.co/300x400?text=QR+Not+Found+Check+Filename'">
        
        <p style="color: #94a3b8; font-size: 14px; margin-bottom: 15px;">Scan QR karein aur screenshot bheinjein</p>
        <a id="whatsappBtn" href="#" target="_blank" class="btn-wa">✅ WhatsApp Screenshot</a>
    </div>

    <script>
        const grid = document.getElementById('numberGrid');
        const myNo = "918521694137";

        for (let i = 1; i <= 40; i++) {
            let btn = document.createElement('button');
            btn.innerText = i;
            btn.className = 'num-btn';
            btn.onclick = function() {
                // Remove selection from others
                document.querySelectorAll('.num-btn').forEach(b => b.classList.remove('selected'));
                // Add selection
                this.classList.add('selected');
                
                // Show payment area
                const payArea = document.getElementById('payment-area');
                payArea.style.display = 'block';
                document.getElementById('displayNum').innerText = i;
                
                // Set WhatsApp Link
                let text = `*VIP DRAW ENTRY*\n*Number:* ${i}\n*Prize:* ₹2000 / ₹300`;
                document.getElementById('whatsappBtn').href = `https://wa.me/${myNo}?text=${encodeURIComponent(text)}`;
                
                // AUTO SCROLL: Ye user ko seedha QR code par le jayega
                setTimeout(() => {
                    payArea.scrollIntoView({behavior: 'smooth', block: 'start'});
                }, 100);
            };
            grid.appendChild(btn);
        }
    </script>
</body>
</html>
