<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Lucky Draw | 1-99</title>
    <style>
        :root {
            --primary-neon: #00ff88;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text-light: #f8fafc;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .header h1 {
            color: var(--primary-neon);
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
            margin-bottom: 5px;
        }

        .price-badge {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid var(--primary-neon);
            padding: 5px 20px;
            border-radius: 50px;
            font-size: 14px;
            color: var(--primary-neon);
        }

        .grid-container {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 500px;
            width: 100%;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(40px, 1fr));
            gap: 10px;
        }

        .num-btn {
            aspect-ratio: 1;
            background: #334155;
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 14px;
        }

        .num-btn:hover {
            background: #475569;
            transform: translateY(-2px);
        }

        .num-btn.selected {
            background: var(--primary-neon);
            color: var(--bg-dark);
            box-shadow: 0 0 20px var(--primary-neon);
            transform: scale(1.1);
        }

        #payment-section {
            display: none;
            margin-top: 30px;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 2px solid var(--primary-neon);
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .qr-img {
            width: 100%;
            max-width: 200px;
            border-radius: 15px;
            margin: 20px 0;
            border: 4px solid white;
        }

        .btn-whatsapp {
            background: #25D366;
            color: white;
            text-decoration: none;
            padding: 15px 30px;
            border-radius: 12px;
            display: inline-block;
            font-weight: bold;
            margin-top: 15px;
            width: 100%;
            box-sizing: border-box;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4);
        }

        .winner-board {
            margin-top: 40px;
            width: 100%;
            max-width: 500px;
            text-align: left;
        }

        .winner-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            border-left: 4px solid var(--primary-neon);
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>VIP DRAW</h1>
        <div class="price-badge">Entry: ₹20 Only</div>
    </div>

    <div class="grid-container">
        <div class="grid" id="numberGrid"></div>
    </div>

    <div id="payment-section">
        <h2 style="margin:0">Number <span id="selectedNum" style="color:var(--primary-neon)">--</span></h2>
        <p style="color: #94a3b8">Scan QR and Send Screenshot</p>
        
        <img src="IMG_3912.png" class="qr-img" alt="QR Code">
        
        <a id="whatsappLink" href="#" target="_blank" class="btn-whatsapp">
            CONFIRM ON WHATSAPP
        </a>
    </div>

    <div class="winner-board">
        <h3 style="color:var(--primary-neon)">LAST WINNERS 🏆</h3>
        <div class="winner-card">
            <span>Morning Draw</span>
            <span style="font-weight:bold">#45 - ₹1,800</span>
        </div>
        <div class="winner-card" style="border-left-color: #fbbf24;">
            <span>Evening Draw</span>
            <span style="font-weight:bold">#12 - ₹1,800</span>
        </div>
    </div>

    <script>
        const grid = document.getElementById('numberGrid');
        const waNumber = "918521694137";

        for (let i = 1; i <= 99; i++) {
            let btn = document.createElement('button');
            btn.innerText = i;
            btn.className = 'num-btn';
            btn.onclick = function() {
                document.querySelectorAll('.num-btn').forEach(b => b.classList.remove('selected'));
                this.classList.add('selected');
                
                document.getElementById('payment-section').style.display = 'block';
                document.getElementById('selectedNum').innerText = i;
                
                let msg = `*VIP LOTTERY ENTRY*\n\n*Number:* ${i}\n*Status:* Payment Done\n\nKripya confirm karein!`;
                document.getElementById('whatsappLink').href = `https://wa.me/${waNumber}?text=${encodeURIComponent(msg)}`;
                
                document.getElementById('payment-section').scrollIntoView({behavior: 'smooth'});
            };
            grid.appendChild(btn);
        }
    </script>
</body>
</html>
